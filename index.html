<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素風格長輩日記</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phone-container">
        <header>
            <h2 id="user-name">阿公的專屬日記</h2> <div id="dino-display" class="pixel-box">
                <div id="dino-sprite" style="font-size: 50px;">🥚</div>
                <p id="dino-status">恐龍正在蛋裡睡覺...</p>
                <div class="progress-bar-container">
                    <div id="progress-fill"></div>
                </div>
                <small id="count-text">本月已打卡: 0 次</small>
            </div>
        </header>

        <section class="main-content">
            <h3>今天心情如何？</h3>
            <div class="mood-selector">
                <button class="mood-btn" onclick="setMood('😊')">😊<br>開心</button>
                <button class="mood-btn" onclick="setMood('💢')">💢<br>生氣</button>
                <button class="mood-btn" onclick="setMood('😢')">😢<br>低落</button>
                <button class="mood-btn" onclick="setMood('😆')">😆<br>很棒</button>
            </div>
            <button id="record-btn" class="pixel-btn-green" onclick="startRecording()">● 按住錄音</button>
            <div id="transcript-display" class="transcript-box">點擊按鈕說說話...</div>
        </section>

        <nav class="bottom-nav">
            <button class="pixel-btn-orange" onclick="alert('已提醒好友錄音囉！')">🔔 提醒他</button>
            <button class="pixel-btn-blue" onclick="openCanvas()">📅 健康打卡</button>
        </nav>
    </div>

    <div id="canvas-modal" class="modal">
        <div class="modal-content pixel-box">
            <span class="close" onclick="closeCanvas()">&times;</span>
            <h2>本月喝水紀錄 💧</h2>
            <div id="pixel-grid" class="pixel-grid"></div>
            <button class="pixel-btn-green" onclick="checkInToday()">我喝水了！</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
